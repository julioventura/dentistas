<div class="container container_principal">
    <!-- Header com título e botões de ação -->
    <div class="header">
        <div class="actions">
            <img src="https://dentistas.com.br/assets/voltar_red.png" class="navegacao" (click)="voltar()">
        </div>
        <h1 class="title">Perfil do Usuário</h1>
        <div class="actions">
            <img src="https://dentistas.com.br/assets/salvar_red.png" class="navegacao" (click)="salvar()">
        </div>
    </div>

    <!-- Bloco de dados pessoais -->
    <div class="record-header">
        {{ user?.nome || 'Nome do Usuário' }}
    </div>

    <!-- Dados Pessoais -->
    <div class="record-details">
        <div class="detail-container">
            <label for="nome" class="detail-label">Nome:</label>
            <input id="nome" [(ngModel)]="user.nome" class="detail-value" type="text" />
        </div>

        <div class="detail-container">
            <label for="username" class="detail-label">Username:</label>
            <input id="username" [(ngModel)]="user.username" class="detail-value" type="text" />
        </div>

        <div class="detail-container">
            <label for="username" class="detail-label">Foto:</label>
            <input id="username" [(ngModel)]="user.foto" class="detail-value" type="text" />
        </div>


        <div class="detail-container">
            <label for="nascimento" class="detail-label">Data de Nascimento:</label>
            <input id="nascimento" [(ngModel)]="user.nascimento" class="detail-value" type="date" />
        </div>

        <div class="detail-container">
            <label for="email" class="detail-label">Email:</label>
            <input id="email" [(ngModel)]="user.email" class="detail-value" type="email" />
        </div>

        <div class="detail-container">
            <label for="whatsapp" class="detail-label">Whatsapp:</label>
            <input id="whatsapp" [(ngModel)]="user.whatsapp" class="detail-value" type="tel" />
        </div>

        <div class="detail-container">
            <label for="telefone" class="detail-label">Telefone:</label>
            <input id="telefone" [(ngModel)]="user.telefone" class="detail-value" type="tel" />
        </div>

        <div class="detail-container">
            <label for="endereco" class="detail-label">Endereço:</label>
            <input id="endereco" [(ngModel)]="user.endereco" class="detail-value" type="text" />
        </div>
    </div>

    <h2>Dados para a Homepage Profissional</h2>
    <div class="record-details">
        <div class="detail-container">
            <label for="titulo-profissional" class="detail-label">Título Profissional:</label>
            <input id="titulo-profissional" [(ngModel)]="user.tituloProfissional" class="detail-value" type="text" />
        </div>

        <div class="detail-container">
            <label for="especialidade" class="detail-label">Especialidade:</label>
            <input id="especialidade" [(ngModel)]="user.especialidade" class="detail-value" type="text" />
        </div>

        <div class="detail-container">
            <label for="descricao" class="detail-label">Convênios:</label>
            <textarea id="descricao" [(ngModel)]="user.convenios" class="detail-value"></textarea>
        </div>

        <div class="detail-container">
            <label for="website" class="detail-label">Outro Site:</label>
            <input id="website" [(ngModel)]="user.website" class="detail-value" type="url" />
        </div>
    </div>

        <h2>Redes Sociais</h2>
        <div class="record-details">
            <div class="detail-container">
                <label for="facebook" class="detail-label">Facebook:</label>
                <input id="facebook" [(ngModel)]="user.facebook" class="detail-value" type="url" />
            </div>
        
            <div class="detail-container">
                <label for="v" class="detail-label">Instagram:</label>
                <input id="instagram" [(ngModel)]="user.instagram" class="detail-value" type="url" />
            </div>
        
            <div class="detail-container">
                <label for="youtube" class="detail-label">Youtube:</label>
                <input id="youtube" [(ngModel)]="user.youtube" class="detail-value" type="url" />
            </div>
        
            <div class="detail-container">
                <label for="linkedin" class="detail-label">Linkedin:</label>
                <input id="linkedin" [(ngModel)]="user.linkedin" class="detail-value" type="url" />
            </div>
        </div>
</div>
