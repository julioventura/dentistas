<div class="container" *ngIf="registro">
  <div class="header">
    <div class="actions">
      <img src="https://dentistas.com.br/assets/voltar.png" class="navegacao" (click)="voltar()">
    </div>
    <h1 class="title">{{ titulo_da_pagina }}</h1>
    <div class="actions">
      <img src="https://dentistas.com.br/assets/editar.png" class="navegacao" (click)="editarRegistro()">
      <img src="https://dentistas.com.br/assets/lixo.png" class="navegacao" (click)="deletarRegistro()">
    </div>
  </div>

  <div class="record-header">
    {{ registro?.nome }}
  </div>

  <div class="record-details">
    <div *ngFor="let campo of campos" class="detail-container">
      <div class="detail-label">{{ campo.label }}</div>

      <!-- Exibir o valor normalmente -->
      <div class="detail-value" *ngIf="campo.tipo !== 'image' && campo.tipo !== 'file' && campo.tipo !== 'url'">{{
        registro[campo.nome] }}</div>

      <!-- Exibir link se for uma URL -->
      <a *ngIf="campo.tipo === 'url' && registro[campo.nome]" [href]="registro[campo.nome]" target="_blank">{{
        registro[campo.nome] }}</a>

      <!-- Exibir imagem se for tipo 'image' e URL for válida -->
      <img *ngIf="isImageUrl(registro[campo.nome])" [src]="registro[campo.nome]" alt="Imagem do Registro"
        style="max-width: 100px; margin-left: 10px;">
    </div>
  </div>
</div>
