<div class="container container_principal">
  <!-- HEADER -->
  <div class="header">
    <div class="actions">
      <img src="https://dentistas.com.br/assets/voltar_red.png" class="navegacao" (click)="voltar()">
    </div>
    <h1 class="title">{{ titulo_da_pagina }}</h1>
    <div class="actions">
      <img src="https://dentistas.com.br/assets/salvar_red.png" class="navegacao" (click)="salvar()">
    </div>
  </div>
  <div class="record-header">
    {{ subtitulo_da_pagina }}
  </div>
  <!-- /HEADER -->

  <!-- Formulário Dinâmico -->
  <div class="dynamic-form-container" *ngIf="FormService.fichaForm && FormService.campos.length > 0">
    <div *ngIf="FormService.isLoading" class="aviso">
      Carregando...
    </div>

    <!-- Formulário para collections (quando não há subcollection) -->
    <form *ngIf="!FormService.isLoading && !subcollection" [formGroup]="FormService.fichaForm" class="record-details borda_reta_topo">
      <!-- Utiliza o agrupamento pré-calculado (camposAgrupados) -->
      <div *ngFor="let grupo of camposAgrupados | keyvalue; trackBy: trackByKey">
        <div class="grupo-titulo">{{ grupo.key }}</div>
        <div *ngFor="let campo of grupo.value; trackBy: trackByCampo">
          <!-- Exibe o campo se for checkbox/boolean ou se o valor estiver preenchido -->
          <div *ngIf="(campo.tipo === 'checkbox' || campo.tipo === 'boolean') || (FormService.registro[campo.nome] !== null && FormService.registro[campo.nome] !== undefined && FormService.registro[campo.nome] !== '' && FormService.registro[campo.nome] !== false)" class="detail-container">
            <label [for]="campo.nome" class="detail-label">{{ campo.label }}</label>
            <ng-container [ngSwitch]="campo.tipo">
              <!-- Para checkbox/bool -->
              <input *ngSwitchCase="'checkbox'" type="checkbox" [formControlName]="campo.nome" [id]="campo.nome">
              <input *ngSwitchCase="'boolean'" type="checkbox" [formControlName]="campo.nome" [id]="campo.nome">
              <!-- Para URL: input editável -->
              <ng-container *ngSwitchCase="'url'">
                <input type="url" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value url">
              </ng-container>
              <!-- For textarea -->
              <textarea *ngSwitchCase="'textarea'" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value" rows="5" placeholder="Digite o conteúdo"></textarea>
              <!-- Demais tipos -->
              <input *ngSwitchDefault [type]="campo.tipo" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value">
            </ng-container>
          </div>
        </div>
      </div>
    </form>

    <!-- Formulário para subcollections com agrupamento -->
    <form *ngIf="!FormService.isLoading && subcollection" [formGroup]="FormService.fichaForm" (ngSubmit)="onSubmit()" class="record-details borda_reta_topo">
      <!-- Grupo de campos fixos -->
      <div *ngFor="let grupo of groupByGrupo(fixedFields) | keyvalue; trackBy: trackByKey">
        <div class="grupo-titulo">{{ grupo.key }}</div>
        <div *ngFor="let campo of grupo.value; trackBy: trackByCampo">
          <div class="detail-container">
            <label [for]="campo.nome" class="detail-label">{{ campo.label }}</label>
            <ng-container [ngSwitch]="campo.tipo">
              <ng-container *ngSwitchCase="'url'">
                <!-- Para URL: input readonly -->
                <input type="url" [formControlName]="campo.nome" class="detail-value url" readonly>
              </ng-container>
              <ng-container *ngSwitchCase="'textarea'">
                <textarea [formControlName]="campo.nome" [id]="campo.nome" class="detail-value" rows="3"></textarea>
              </ng-container>
              <ng-container *ngSwitchDefault>
                <input [type]="campo.tipo" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value">
              </ng-container>
            </ng-container>
          </div>
        </div>
      </div>

      <br *ngIf="subcollection && adjustableFields.length > 0">

      <!-- Slider para ajuste de largura (apenas se houver campos ajustáveis) -->
      <div class="width-control" *ngIf="subcollection && adjustableFields.length > 0">
        <div class="slider-wrapper">
          <label for="labelWidthRange"></label>
          <input type="range" id="labelWidthRange" min="100" max="500" [(ngModel)]="customLabelWidthValue" [ngModelOptions]="{standalone: true}" (input)="updateCustomLabelWidth()">
          <span class="small">{{ customLabelWidthValue }}px</span>
        </div>
      </div>

      <!-- Grupo de campos ajustáveis -->
      <div class="width-control" *ngIf="subcollection && adjustableFields.length > 0">
        <div class="record-details" [style.--label-width]="customLabelWidth">
          <div *ngFor="let grupo of groupByGrupo(adjustableFields) | keyvalue; trackBy: trackByKey">
            <div class="grupo-titulo">{{ grupo.key }}</div>
            <div *ngFor="let campo of grupo.value; trackBy: trackByCampo">
              <div class="detail-container">
                <label [for]="campo.nome" class="detail-label">{{ campo.label }}:</label>
                <ng-container [ngSwitch]="campo.tipo">
                  <input *ngSwitchCase="'url'" type="url" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value">
                  <textarea *ngSwitchCase="'textarea'" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value"></textarea>
                  <input *ngSwitchCase="'checkbox'" type="checkbox" [formControlName]="campo.nome" [id]="campo.nome">
                  <input *ngSwitchCase="'boolean'" type="checkbox" [formControlName]="campo.nome" [id]="campo.nome">
                  <input *ngSwitchDefault [type]="campo.tipo" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value">
                </ng-container>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
