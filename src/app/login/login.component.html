<div class="login-container">
  <h2>Login</h2>
  <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="form-group">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            #emailInput="ngModel"
            class="form-control"
          />
          <div *ngIf="emailInput.invalid && emailInput.touched" class="error-message">
              O email é obrigatório.
          </div>
      </div>

      <div class="form-group password-container">
          <label for="password">Senha:</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            #passwordInput="ngModel"
            class="form-control"
          />
          <span id="togglePassword" class="password-toggle" (click)="togglePassword()">
              <i class="fas fa-eye" id="password-icon"></i>
          </span>
          <div *ngIf="passwordInput.invalid && passwordInput.touched" class="error-message">
              A senha é obrigatória.
          </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-primary-login">Entrar</button>
  </form>

  <a routerLink="/reset-password" class="forgot-password-link">Esqueci minha senha</a>
</div>
