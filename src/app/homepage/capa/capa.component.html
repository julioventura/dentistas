<div class="capa-container" [ngClass]="{'dark-mode': darkMode}">
  <div class="capa-background" [style.backgroundImage]="getBackgroundImage()">
    <div class="capa-content">
      <!-- Seção da foto do perfil -->
      <div class="profile-section">
        <div class="profile-image" *ngIf="userProfile?.foto">
          <img [src]="userProfile.foto" [alt]="userProfile?.nome || 'Foto do profissional'">
        </div>
      </div>
      
      <!-- Seção de informações -->
      <div class="info-section">
        <div class="title-area">
          <h1>{{ userProfile?.nome || 'Nome do Profissional' }}</h1>
          <h2>{{ userProfile?.tituloProfissional || 'Cirurgião-Dentista' }}</h2>
        </div>
        
        <div class="badges-row" *ngIf="userProfile?.especialidades?.length">
          <span class="badge" *ngFor="let esp of userProfile?.especialidades?.slice(0,3)">
            {{ esp }}
          </span>
        </div>
        
        <!-- <div class="action-buttons">
          <a href="https://wa.me/{{ getWhatsappFormatado() }}" target="_blank" class="btn secondary">
            <i class="fab fa-whatsapp"></i> 
            WhatsApp
          </a>
        </div> -->
        
      </div>
    </div>
  </div>
</div>
