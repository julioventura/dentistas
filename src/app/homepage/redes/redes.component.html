<div class="profile-card redes-card" [ngClass]="{'dark-mode': darkMode}">
  <div class="card-header">
    <h3>Redes Sociais</h3>
    <!-- Debug info -->
    <small *ngIf="!userProfile" style="color: red;">userProfile não disponível</small>
  </div>
  
  <div class="card-body">
    <!-- Indicador de carregamento -->
    <div *ngIf="!dadosCarregados" class="loading-message">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Carregando redes sociais...</span>
    </div>
    
    <!-- Conteúdo quando dados estiverem carregados -->
    <ng-container *ngIf="dadosCarregados">
      <div class="redes-lista" *ngIf="userProfile">
        <!-- Instagram -->
        <a *ngIf="userProfile.instagram" [href]="getInstagramUrl()" target="_blank" rel="noopener" class="rede-item instagram">
          <i class="fab fa-instagram"></i>
          <span>{{ userProfile.instagram }}</span>
        </a>
        
        <!-- Facebook -->
        <a *ngIf="userProfile?.facebook" [href]="getFacebookUrl()" target="_blank" rel="noopener" class="rede-item facebook">
          <i class="fab fa-facebook-f"></i>
          <span>{{ userProfile.facebook }}</span>
        </a>
        
        <!-- LinkedIn -->
        <a *ngIf="userProfile?.linkedin" [href]="getLinkedinUrl()" target="_blank" rel="noopener" class="rede-item linkedin">
          <i class="fab fa-linkedin-in"></i>
          <span>{{ userProfile.linkedin }}</span>
        </a>
        
        <!-- YouTube -->
        <a *ngIf="userProfile?.youtube" [href]="getYoutubeUrl()" target="_blank" rel="noopener" class="rede-item youtube">
          <i class="fab fa-youtube"></i>
          <span>{{ userProfile.youtube }}</span>
        </a>
        
        <!-- Twitter -->
        <a *ngIf="userProfile?.twitter" [href]="getTwitterUrl()" target="_blank" rel="noopener" class="rede-item twitter">
          <i class="fab fa-twitter"></i>
          <span>{{ userProfile.twitter }}</span>
        </a>
        
        <!-- TikTok -->
        <a *ngIf="userProfile?.tiktok" [href]="getTikTokUrl()" target="_blank" rel="noopener" class="rede-item tiktok">
          <i class="fab fa-tiktok"></i>
          <span>{{ userProfile.tiktok }}</span>
        </a>
        
        <!-- Pinterest -->
        <a *ngIf="userProfile?.pinterest" [href]="getPinterestUrl()" target="_blank" rel="noopener" class="rede-item pinterest">
          <i class="fab fa-pinterest-p"></i>
          <span>{{ userProfile.pinterest }}</span>
        </a>
      </div>
      
      <div class="sem-redes" *ngIf="!hasRedesSociais()">
        <i class="fas fa-info-circle"></i>
        <p>Redes sociais não informadas.</p>
      </div>
    </ng-container>
  </div>
</div>
