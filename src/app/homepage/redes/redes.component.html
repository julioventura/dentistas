<div class="profile-card redes-card" [ngClass]="{'dark-mode': darkMode}">
  <div class="card-header">
    <h3>Redes Sociais</h3>
  </div>
  
  <div class="card-body">
    <div class="redes-lista" *ngIf="hasRedesSociais()">
      <a *ngIf="userProfile?.instagram" [href]="getInstagramUrl()" target="_blank" class="rede-item instagram">
        <i class="fab fa-instagram"></i>
        <span>Instagram</span>
      </a>
      
      <a *ngIf="userProfile?.facebook" [href]="getFacebookUrl()" target="_blank" class="rede-item facebook">
        <i class="fab fa-facebook-f"></i>
        <span>Facebook</span>
      </a>
      
      <a *ngIf="userProfile?.linkedin" [href]="getLinkedinUrl()" target="_blank" class="rede-item linkedin">
        <i class="fab fa-linkedin-in"></i>
        <span>LinkedIn</span>
      </a>
      
      <a *ngIf="userProfile?.youtube" [href]="getYoutubeUrl()" target="_blank" class="rede-item youtube">
        <i class="fab fa-youtube"></i>
        <span>YouTube</span>
      </a>
      
      <a *ngIf="userProfile?.website" [href]="userProfile.website" target="_blank" class="rede-item website">
        <i class="fas fa-globe"></i>
        <span>Website</span>
      </a>
    </div>
    
    <div class="sem-redes" *ngIf="!hasRedesSociais()">
      <i class="fas fa-info-circle"></i>
      <p>Este profissional não informou redes sociais.</p>
    </div>
  </div>
</div>
