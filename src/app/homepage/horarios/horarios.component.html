<div class="profile-card horarios-card" [ngClass]="{'dark-mode': darkMode}">
  <div class="card-header">
    <h3>Horários de Atendimento</h3>
  </div>
  
  <div class="card-body">
    <div class="horarios-lista">
      <div class="horario-item" *ngFor="let horario of getHorarios()">
        <div class="dia">
          <i *ngIf="showIcon" class="fas fa-calendar-day"></i>
          <span>{{ horario.dia }}</span>
        </div>
        <div class="hora">{{ horario.horario }}</div>
      </div>
    </div>
    
  </div>
</div>
