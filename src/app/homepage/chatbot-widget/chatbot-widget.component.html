<div class="chatbot-widget" 
     [@expandAnimation]="isMinimized ? 'minimized' : 'expanded'"
     [ngClass]="{
       'minimized': isMinimized,
       'expanded': !isMinimized && !isMaximized,
       'maximized': !isMinimized && isMaximized
     }">
  <!-- Cabeçalho -->
  <div class="chat-header" (click)="toggleChat()">
    <ng-container *ngIf="isMinimized">
      <i class="chatbot-icon fa-solid fa-robot"></i>
    </ng-container>
    <ng-container *ngIf="!isMinimized">
      <button class="maximize-btn" (click)="toggleMaximize(); $event.stopPropagation()">
        <i *ngIf="!isMaximized" class="fa-solid fa-expand"></i>
        <i *ngIf="isMaximized" class="fa-solid fa-compress"></i>
      </button>
      <span class="chatbot-title">Assistente Virtual de I.A.</span>
      <button class="minimize-btn" (click)="toggleChat(); $event.stopPropagation()">–</button>
    </ng-container>
  </div>
  
  <!-- Corpo do chat – exibido apenas se não estiver minimizado -->
  <div class="chat-body" *ngIf="!isMinimized">
    <div class="message">Olá! Como posso ajudar?</div>
    <div class="chat-input-container">
      <input type="text" class="chat-input" placeholder="Digite sua mensagem..." />
      <button class="chat-send-btn">Enviar</button>
    </div>
  </div>
</div>
