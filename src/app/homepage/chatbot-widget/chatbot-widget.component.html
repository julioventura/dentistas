<div class="chatbot-widget" [ngClass]="{'minimized': isMinimized, 'expanded': !isMinimized}">
  <!-- Cabeçalho: ao clicar alterna entre minimizado e expandido -->
  <div class="chat-header" (click)="toggleChat()">
    <!-- Exibido quando expandido -->
    <ng-container *ngIf="!isMinimized">
      <span class="chatbot-title">Assistente Virtual de I.A.</span>
      <button class="minimize-btn" (click)="toggleChat(); $event.stopPropagation()">–</button>
    </ng-container>
    <!-- Ícone minimizado -->
    <ng-container *ngIf="isMinimized">
      <i class="chatbot-icon fa-solid fa-robot"></i>
    </ng-container>
  </div>

  <!-- Corpo do chat: exibido apenas quando expandido -->
  <div class="chat-body" *ngIf="!isMinimized">
    <!-- Conteúdo do chat (pode ser modificado conforme necessário) -->
    <div class="message">Bem-vindo! Como posso ajudar?</div>
    <!-- Outros elementos de mensagem, input, etc. -->
    <div class="chat-input-container">
      <input type="text" class="chat-input" placeholder="Digite sua mensagem..." />
      <button class="chat-send-btn">Enviar</button>
    </div>
  </div>
</div>
