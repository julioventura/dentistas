<div class="chatbot-widget" [class.minimized]="isMinimized">
  <!-- Botão de chat minimizado -->
  <div class="chat-button" *ngIf="isMinimized" (click)="toggleChat()">
    <span class="chat-icon">💬</span>
  </div>
  
  <!-- Interface de chat expandida -->
  <div class="chat-container" *ngIf="!isMinimized">
    <!-- Cabeçalho -->
    <div class="chat-header">
      <h3>Atendimento Virtual</h3>
      <button class="close-button" (click)="toggleChat()">
        <span class="close-icon">✕</span>
      </button>
    </div>
    
    <!-- Mensagens -->
    <div class="chat-messages">
      <div *ngFor="let message of messages" 
           class="message" 
           [class.user-message]="message.sender === 'user'" 
           [class.bot-message]="message.sender === 'bot'">
        <div class="message-content">
          {{ message.content }}
        </div>
        <div class="message-time">
          {{ message.timestamp | date:'HH:mm' }}
        </div>
      </div>
      
      <!-- Indicador de digitação -->
      <div *ngIf="isBotTyping" class="message bot-message typing">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    
    <!-- Área de input -->
    <div class="chat-input">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        placeholder="Digite sua mensagem..."
        (keyup.enter)="sendMessage()" />
      <button (click)="sendMessage()">
        <span class="send-icon">➤</span>
      </button>
    </div>
  </div>
</div>
