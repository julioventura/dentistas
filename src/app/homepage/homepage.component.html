<!-- Exibe a homepage pública se houver um username na rota -->
<div class="container">

    <div class="profile-header">
        <div class="header-bg">
            <!-- Foto do usuário -->
            <img src="{{ userProfile.foto }}" alt="{{ userProfile.nome}}" class="profile-photo">
            <div class="header-overlay">
                <h1>{{ userProfile.nome }}</h1> <!-- Nome do dentista -->
                <h3 class="center">{{ userProfile.tituloProfissional }}</h3> <!-- Título Profissional -->

            </div>
        </div>
    </div>

    <div class="profile-info">

        <app-contato [userProfile]="userProfile" [darkMode]="false"></app-contato> 
    
        <app-endereco [userProfile]="userProfile" [darkMode]="false"></app-endereco>

        <app-titulacoes [userProfile]="userProfile" [darkMode]="false"></app-titulacoes>

        <app-horarios [userProfile]="userProfile" [darkMode]="false"></app-horarios>

    </div>

    <div class="social-media">
        <h2>Convênios</h2>
        <div class="center">
            {{userProfile.convenios}}

        </div>
    </div>

    <div class="social-media">
        <h2>Redes Sociais</h2>
        <div class="center">
            <a href="{{ userProfile.facebook }}" target="_blank">
                <img src="https://dentistas.com.br/assets/facebook.png" alt="Facebook" width="40" />
            </a>

            <a href="{{ userProfile.instagram }}" target="_blank">
                <img src="https://dentistas.com.br/assets/instagram.png?v=1" alt="Instagram" width="40" />
            </a>

            <a href="{{ userProfile.youtube }}" target="_blank">
                <img src="https://dentistas.com.br/assets/youtube.png" alt="YouTube" width="40" />
            </a>
        </div>
    </div>

    <div class="cartao-digital">
        <h2>Cartão de Visitas Digital</h2>
        <div class="center">
            <!-- Exibe o QR Code para a URL da homepage do usuário -->
            <div class="qr-code" *ngIf="qrCodeUrl">
                <img [src]="qrCodeUrl" alt="QR Code da homepage">
            </div>
        </div>
    </div>

    <app-rodape-homepage></app-rodape-homepage>

</div>


<!-- Chatbot Widget -->
<app-chatbot-widget 
    [dentistId]="userProfile?.uid || ''" 
    [dentistName]="userProfile?.nome || 'Dentista'"
      *ngIf="userProfile && !isLoading">
</app-chatbot-widget>
