<div class="container container_principal">

    <div class="header">
        <div class="actions">
            <img src="https://dentistas.com.br/assets/voltar.png" class="navegacao" (click)="util.goHome()">
        </div>
        <h1 class="title">TutFOP - Tutor Virtual de Casos Clínicos</h1>
        <div class="actions">
            <img src="https://dentistas.com.br/assets/vazio.png" class="navegacao">
        </div>
    </div>

    <div class="container" style="padding: 0;">

        <div class="tutfop-container" *ngIf="isUserAuthenticated">
            <!-- Container principal do TutFOP -->
            <div class="tutfop-container-main">

                <main class="tutfop-main">

                    <!-- Container do Chat -->
                    <div id="tutfop-chat-container" class="tutfop-container-section" style="display: none;">

                        <div id="tutfop-chat-log" class="tutfop-chat-log">
                            <!-- Aqui entra aconversa do chat -->
                        </div>

                        <div class="tutfop-chat-input-container">
                            <textarea id="tutfop-user-input" placeholder="Digite sua mensagem..." rows="3" class="tutfop-textarea"></textarea>
                            <div class="tutfop-button-container">
                                <button id="tutfop-send-button" (click)="sendTutfopMessage()"
                                    class="tutfop-btn-primary">
                                    Enviar
                                </button>
                                <button (click)="logoutTutfop()" class="tutfop-btn-primary tutfop-btn-logout">
                                    Limpar
                                </button>
                            </div>
                        </div>

                    </div>
                </main>

            </div>
        </div>

    </div>

</div>
