<div class="container container_principal">

  <div class="header">
    <div class="actions">
      <img src="https://dentistas.com.br/assets/voltar.png" class="navegacao" (click)="util.goHome()">
    </div>
    <h1 class="title">Backup de Dados</h1>
    <div class="actions">
      <img src="https://dentistas.com.br/assets/vazio.png" class="navegacao">
    </div>
  </div>

  <div class="container">
    <div id="Services" class="container margin0">
      <section class="services-section icon-grid largo">
        <div class="icon-item" (click)="gerarBackup()">
          <img src="https://dentistas.com.br/assets/historico.png" class="navegacao" alt="Gerar Backup">
          <p>FAZER BACKUP</p>
        </div>
      </section>
    </div>

    <div class="espacador_vertical"></div>

    <div *ngIf="loading" class="center">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>

    <p *ngIf="message">{{ message }}</p>
  </div>

</div>
