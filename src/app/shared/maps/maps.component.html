<div class="profile-card map-card" [ngClass]="{'dark-mode': darkMode}">
  <div class="card-header">
    <h3>Localização</h3>
  </div>
  
  <div class="card-body">
    <div class="map-container">
      <div class="map-fallback">
        <!-- Imagem estática genérica de mapa -->
        <div class="map-static-image">
          <div class="map-pin">
            <i class="fas fa-map-marker-alt"></i>
          </div>
        </div>
        
        <div class="address-details">
          <h4>{{ getAddressTitle() }}</h4>
          <p>{{ address }}</p>
        </div>
        
        <div class="map-actions">
          <a [href]="googleMapsUrl" 
             target="_blank" 
             class="map-link primary">
            <i class="fas fa-map"></i>
            Ver no Google Maps
          </a>
          <a [href]="'https://waze.com/ul?q=' + address" 
             target="_blank" 
             class="map-link primary">
            <i class="fab fa-waze"></i>
            Navegação Waze
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
