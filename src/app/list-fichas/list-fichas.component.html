<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="actions">
            <img src="https://dentistas.com.br/assets/voltar.png" class="navegacao" (click)="voltar()">
            <img src="https://dentistas.com.br/assets/home.png" class="navegacao" (click)="util.goHome()">
        </div>
        <h1 class="title">{{ titulo_da_pagina }}</h1>
        <div class="actions">
            <img src="https://dentistas.com.br/assets/novo.png" class="navegacao_dupla_largura_right"
                (click)="incluir()">
        </div>
    </div>

    <div class="record-header">
        {{ subtitulo_da_pagina }}
    </div>

    <!-- Exibir mensagem de carregamento enquanto os dados estão sendo buscados -->
    <div *ngIf="isLoading" class="aviso">
        <p>Carregando...</p>
    </div>

    <div *ngIf="!isLoading && fichas.length === 0" class="aviso">
        <p>Nenhuma ficha encontrada.</p>
    </div>



    <!-- Tabela da lista de registros -->
    <div *ngIf="fichas.length > 0" class="registros-table">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th class="right">Nome</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let ficha of fichas" (click)="verFicha(ficha.id)" style="cursor: pointer;">
                    <td>{{ ficha.data }}</td>
                    <td class="right">{{ ficha.nome }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Paginação -->
    <!-- <div class="pagination">
        <button (click)="previousPage()">Anterior</button>
        <span>Página {{ page }} de {{ totalPages }}</span>
        <button (click)="nextPage()">Próximo</button>
    </div> -->
</div>
