<div [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
</div>

<ng-container *ngIf="showFooter">
    <app-footer></app-footer>
</ng-container>

<!-- Chatbot Widget Global Flutuante -->
<app-chatbot-widget 
    class="global-chatbot-widget"
    [dentistId]="'currentUserId'"
    [dentistName]="'Assistente'"
    (expansionChange)="'onChatbotExpansionChange($event)'"
    *ngIf="'isAuthenticated'">
</app-chatbot-widget>
