<div class="container">
  <!-- Header -->
  <div class="header">
    <img src="https://dentistas.com.br/assets/voltar.png" class="navegacao" (click)="goHome()">
    <h1 class="title">Usuários</h1>
    <img src="https://dentistas.com.br/assets/novo.png" class="navegacao" (click)="adicionar()">
  </div>

  <!-- Barra de pesquisa -->
  <div class="search-bar">
    <input type="text" placeholder="Buscar usuário..." />
  </div>

  <!-- Tabela de usuários -->
  <div class="registros-table">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF</th>
          <th>Telefone</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of usuarios" (click)="verFicha(usuario.id)" style="cursor: pointer;">
          <td>{{ usuario.nome }}</td>
          <td>{{ usuario.cpf }}</td>
          <td>{{ usuario.telefone }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Paginação -->
  <div class="pagination">
    <button (click)="previousPage()">Anterior</button>
    <span>Página {{ page }} de {{ totalPages }}</span>
    <button (click)="nextPage()">Próximo</button>
  </div>
</div>
