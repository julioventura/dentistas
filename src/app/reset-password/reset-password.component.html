<h2>Redefinir Senha</h2>
<form (ngSubmit)="onSubmit()">
  <div>
    <label for="email">Digite seu email:</label>
    <input
      type="email"
      id="email"
      [(ngModel)]="email"
      name="email"
      required
    />
  </div>
  <button type="submit">Enviar Email de Redefinição</button>
</form>
