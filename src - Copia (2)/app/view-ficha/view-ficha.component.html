<div class="container">
  <div class="header">
    <div class="actions">
      <img src="https://dentistas.com.br/assets/voltar.png" class="navegacao" (click)="voltar()">
      <img src="https://dentistas.com.br/assets/home.png" class="navegacao" (click)="util.goHome()">
    </div>
    <h1 class="title">{{ titulo_da_pagina }}</h1>
    <div class="actions">
      <img src="https://dentistas.com.br/assets/editar.png" class="navegacao" (click)="editar()">
      <img src="https://dentistas.com.br/assets/lixo.png" class="navegacao" (click)="excluir()">
    </div>
  </div>

  <div class="record-header">
    {{ subCollection }}
  </div>



  <!-- Detalhes -->
  <div class="dynamic-form-container" *ngIf="this.FormService.fichaForm">

    <div *ngIf="FormService.isLoading" class="aviso">
      Carregando dados da ficha...
    </div>


        <form *ngIf="!FormService.isLoading" [formGroup]="FormService.fichaForm" class="record-details">
          <div *ngFor="let campo of FormService.campos" class="detail-container">
            <label [for]="campo.nome" class="detail-label">{{ campo.label }}</label>
        
            <!-- Input para tipos normais -->
            <input [type]="campo.tipo" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value"
              *ngIf="campo.tipo !== 'file' && campo.tipo !== 'image' && campo.tipo !== 'url'">
        
            <!-- Input para URL -->
            <input type="url" [formControlName]="campo.nome" [id]="campo.nome" class="detail-value" *ngIf="campo.tipo === 'url'"
              placeholder="Cole aqui o link do arquivo">
        
            <!-- Input de Upload de Arquivo para imagens e arquivos -->
            <!-- <input type="file" (change)="onFileSelected($event, campo.nome)"
              *ngIf="campo.tipo === 'file' || campo.tipo === 'image'"> -->
        
            <!-- Mostrar imagem carregada se for um URL de imagem válida -->
            <!-- <img *ngIf="util.isImageUrl(registro[campo.nome])" [src]="registro[campo.nome]" alt="Uploaded Image"
              style="max-width: 100px; margin-top: 10px;"> -->
        
            <!-- Mostrar link para arquivo -->
            <!-- <a *ngIf="campo.tipo === 'file' && registro[campo.nome] && !util.isImageUrl(registro[campo.nome])"
              [href]="registro[campo.nome]" target="_blank">Ver Arquivo</a> -->
          </div>
        </form>



  </div>
</div>
